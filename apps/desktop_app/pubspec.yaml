name: desktop_app
description: offline_School desktop application for Windows

publish_to: none

version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database — SQLite via Drift ORM
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0
  pdf: ^3.11.1
  printing: ^5.13.4

  # HTTP client for backend sync
  dio: ^5.4.3

  # Connectivity detection
  connectivity_plus: ^6.0.3

  # State management
  provider: ^6.1.2

  # Secure token storage (offline JWT + device token)
  flutter_secure_storage: ^9.2.2

  # UUID generation for idempotency keys
  uuid: ^4.4.0

  # Logging
  logger: ^2.4.0
  crypto: ^3.0.3
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

# ─── MSIX (Windows installer) ────────────────────────────────────────────────
# Run: flutter pub run msix:create
msix_config:
  display_name: offline_School
  publisher_display_name: offline_School Team
  identity_name: com.offlineschool.desktop
  msix_version: 0.1.0.0
  logo_path: assets/icons/app_icon.png
  start_menu_icon_path: assets/icons/app_icon.png
  capabilities: 'internetClient,privateNetworkClientServer'
  install_certificate: false
